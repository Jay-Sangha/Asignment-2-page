<!DOCTYPE html>
<html>
  <head>
    <title>Blocky3D Horse</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <div id="app">
      <canvas id="webgl" width="600" height="600"></canvas>

      <div id="ui">
        <div class="row">
          <label
            >Global rotation (Y)
            <input id="globalRot" type="range" min="-180" max="180" value="0" />
          </label>
          <span id="globalRotVal">0</span>
        </div>

        <div class="row">
          <label
            >Mouse tilt (X)
            <input id="mouseTilt" type="range" min="-60" max="60" value="-20" />
          </label>
          <span id="mouseTiltVal">-20</span>
        </div>

        <p class="hint">Drag on canvas to rotate. Shift+click = poke (wink).</p>

        <h2>Front left leg</h2>
        <div class="row">
          <label
            >Shoulder
            <input
              id="frontShoulder"
              type="range"
              min="-90"
              max="90"
              value="15"
            />
          </label>
          <span id="frontShoulderVal">15</span>
        </div>
        <div class="row">
          <label
            >Knee
            <input id="frontKnee" type="range" min="-120" max="30" value="-25" />
          </label>
          <span id="frontKneeVal">-25</span>
        </div>
        <div class="row">
          <label
            >Ankle
            <input id="frontAnkle" type="range" min="-60" max="60" value="10" />
          </label>
          <span id="frontAnkleVal">10</span>
        </div>

        <div class="row">
          <button id="toggleAnim">Animation: OFF</button>
          <span id="fps">FPS: --</span>
        </div>
      </div>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
